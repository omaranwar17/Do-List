<div class="min-h-screen bg-gray-100 py-10 px-4">

  <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-10">

    <!-- Title -->
    <h1
      class="text-3xl md:text-4xl font-bold text-center text-white bg-gray-800 py-4 rounded-xl shadow-md">
      To Do List
    </h1>

    <!-- Input Section -->
    <div class="mt-8 flex flex-col md:flex-row gap-4 items-center">

      <div class="w-full">
        <label class="block text-lg font-medium text-gray-700 mb-2">
          Add New Task
        </label>

        <input
  [(ngModel)]="newTask"
  type="text"
  placeholder="Enter your task..."
  class="w-full px-4 py-3 rounded-xl border border-gray-300
  focus:outline-none focus:ring-2 focus:ring-sky-400
  transition-all duration-300">
      </div>

      <div class="w-full md:w-40 mt-0 md:mt-8">
        <button
          (click)="addTask()"
          class="w-full bg-sky-500 hover:bg-sky-600
          text-white font-semibold py-3 rounded-xl
          transition-all duration-300 shadow-md">
          Add
        </button>
      </div>

    </div>

    <!-- Empty State -->
    <div *ngIf="toDoItem.length === 0"
      class="text-center py-10 text-gray-400 text-lg">
      No Tasks Yet 🚀
    </div>

    <!-- Table -->
    <div *ngIf="toDoItem.length > 0"
      class="mt-8 overflow-x-auto rounded-xl border border-gray-200">

      <table class="w-full text-sm text-left">

        <thead class="bg-gray-800 text-white">
          <tr>
            <th class="px-6 py-4">Task</th>
            <th class="px-6 py-4 text-center">Completed</th>
            <th class="px-6 py-4 text-center">Delete</th>
          </tr>
        </thead>

        <tbody>

          <tr
            *ngFor="let todo of toDoItem; let i = index"
            class="border-b hover:bg-gray-50 transition-all duration-200">

            <!-- Task -->
            <td
              [ngClass]="{'completed-task': todo.coplated}"
              class="px-6 py-4 font-medium text-gray-700">
              {{ todo.task }}
            </td>

            <!-- Checkbox -->
            <td class="px-6 py-4 text-center">

              <input
                [checked]="todo.coplated"
                (change)="todoUbdet(i)"
                type="checkbox"
                class="w-5 h-5 accent-sky-500 cursor-pointer">

            </td>

            <!-- Delete -->
            <td class="px-6 py-4 text-center">

              <button
                (click)="delete(todo.id)"
                class="bg-red-500 hover:bg-red-600
                text-white px-4 py-2 rounded-lg
                transition-all duration-300 shadow-sm">
                Delete
              </button>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
